name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install packaging tools
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build release binaries
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release -p server -p cli

      - name: Build .deb package
        run: cargo deb -p server --no-build

      - name: Build .rpm package
        run: cargo generate-rpm -p crates/server

      - name: Collect release packages
        run: |
          mkdir -p target/packages
          cp target/debian/*.deb target/packages/
          cp target/generate-rpm/*.rpm target/packages/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: target/packages/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/packages/*
