name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build release binaries
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release

      - name: Build .deb package
        run: cargo deb -p server --no-build

      - name: Build .rpm package
        run: cargo generate-rpm -p crates/server

      - name: Gather artifacts
        id: artifacts
        run: |
          DEB=$(ls target/debian/*.deb)
          RPM=$(ls target/generate-rpm/*.rpm)
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "rpm=$RPM" >> "$GITHUB_OUTPUT"
          echo "deb_name=$(basename $DEB)" >> "$GITHUB_OUTPUT"
          echo "rpm_name=$(basename $RPM)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.deb }}
            ${{ steps.artifacts.outputs.rpm }}
