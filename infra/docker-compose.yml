services:
  postgres:
    image: postgres:16-alpine
    container_name: effecty-postgres
    environment:
      POSTGRES_USER: effecty
      POSTGRES_PASSWORD: effecty
      POSTGRES_DB: effecty
    ports:
      - "5432:5432"
    volumes:
      - effecty_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  effecty_pgdata:
