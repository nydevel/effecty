services:
  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: effecty-server
    restart: unless-stopped
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgres://effecty:effecty@host.docker.internal:5432/effecty}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-production}
    volumes:
      - effecty-uploads:/app/uploads
    networks:
      - shifu-network

networks:
  shifu-network:
    external: true
    name: infra_shifu-network

volumes:
  effecty-uploads:
