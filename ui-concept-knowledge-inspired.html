<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Effecty — Knowledge Inspired Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #f0ede8;
      --color-surface-dynamic: #e6e3de;
      --color-divider: #dcd9d5;
      --color-border: #d0cdc6;
      --color-text: #1e1c18;
      --color-text-muted: #6b6966;
      --color-text-faint: #b0aeaa;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #d0dedd;
      --color-primary-glow: rgba(1, 105, 111, 0.15);
      --color-accent2: #7a39bb;
      --color-warning: #c47a1a;
      --color-success: #3d7a1e;
      --color-error: #a12c7b;
      --shadow-sm: 0 1px 3px rgba(30, 28, 24, 0.07);
      --shadow-md: 0 4px 14px rgba(30, 28, 24, 0.09);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --font-body: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    [data-theme="dark"] {
      --color-bg: #141312;
      --color-surface: #1a1917;
      --color-surface-2: #1e1d1b;
      --color-surface-offset: #232220;
      --color-surface-dynamic: #2e2d2b;
      --color-divider: #2c2b29;
      --color-border: #333230;
      --color-text: #d8d6d2;
      --color-text-muted: #7a7876;
      --color-text-faint: #4d4c4a;
      --color-primary: #4fa8b0;
      --color-primary-hover: #2d8a92;
      --color-primary-highlight: #1f3739;
      --color-primary-glow: rgba(79, 168, 176, 0.12);
      --color-accent2: #a87fe0;
      --color-warning: #e8a020;
      --color-success: #6db840;
      --color-error: #d870b0;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25);
      --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
    }

    .app {
      height: 100vh;
      width: 100vw;
      display: flex;
      overflow: hidden;
    }

    /* Left rail must stay like current app */
    .icon-bar {
      width: 72px;
      min-width: 72px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 6px;
      box-shadow: 2px 0 14px rgba(0, 0, 0, 0.2);
      z-index: 3;
    }

    .icon-btn {
      width: 54px;
      height: 54px;
      color: #8888aa;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .icon-btn:hover,
    .icon-btn.active {
      background: #2a2a4a;
      color: #e0e0ff;
    }

    .icon-bar-divider {
      width: 36px;
      height: 1px;
      background: #3a3a5a;
      margin: 4px 0;
    }

    .icon-bar-spacer {
      flex: 1;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 48px;
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 200px;
    }

    .search-wrap {
      position: relative;
      width: min(560px, 100%);
    }

    .search {
      width: 100%;
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 8px 12px 8px 34px;
      font-size: 13px;
    }

    .search:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-glow);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-faint);
      pointer-events: none;
    }

    .topbar-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .tb-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .tb-btn:hover {
      background: var(--color-surface-offset);
      color: var(--color-text);
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .context {
      width: 250px;
      border-right: 1px solid var(--color-divider);
      background: var(--color-surface);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .context-header {
      padding: 10px 10px 8px;
      border-bottom: 1px solid var(--color-divider);
    }

    .context-title {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-faint);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .context-add {
      width: 100%;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
      padding: 7px 9px;
      font-size: 12px;
      color: var(--color-text-muted);
      text-align: left;
      cursor: pointer;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .context-add:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-highlight);
    }

    .context-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .context-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 9px;
      border-radius: var(--radius-md);
      color: var(--color-text-muted);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .context-item:hover {
      background: var(--color-surface-offset);
      color: var(--color-text);
    }

    .context-item.active {
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      font-weight: 500;
    }

    .context-item .count {
      margin-left: auto;
      font-size: 11px;
      color: var(--color-text-faint);
    }

    .feature {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .feature-toolbar {
      height: 44px;
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface-2);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .ft-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text);
    }

    .ft-sub {
      font-size: 11px;
      color: var(--color-text-faint);
    }

    .chip {
      border: 1px solid var(--color-border);
      background: var(--color-surface-offset);
      border-radius: 99px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--color-text-muted);
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-highlight);
    }

    .primary {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: var(--radius-md);
      background: var(--color-primary);
      color: #fff;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    .primary:hover {
      background: var(--color-primary-hover);
    }

    .feature-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      padding: 12px;
      box-shadow: var(--shadow-sm);
    }

    .card h4 {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card .big {
      font-size: 24px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      margin-bottom: 4px;
    }

    .card .small {
      font-size: 11px;
      color: var(--color-text-faint);
    }

    .split {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 10px;
    }

    .panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      min-height: 260px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--color-divider);
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text);
    }

    .panel-body {
      flex: 1;
      padding: 10px;
      overflow: auto;
    }

    .row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .row:hover {
      border-color: var(--color-border);
      background: var(--color-surface-offset);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--color-primary);
    }

    .mono {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-text-muted);
    }

    .tag {
      font-size: 10px;
      border-radius: 99px;
      padding: 2px 7px;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      height: 100%;
    }

    .k-col {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }

    .k-head {
      padding: 8px 10px;
      border-bottom: 1px solid var(--color-divider);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-text-faint);
    }

    .k-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow: auto;
      min-height: 0;
    }

    .k-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 8px;
      background: var(--color-surface);
      font-size: 12px;
      cursor: pointer;
    }

    .k-card:hover {
      border-color: var(--color-primary);
    }

    .k-card b {
      display: block;
      margin-bottom: 3px;
      color: var(--color-text);
      font-size: 12px;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 7px;
    }

    .week-day {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
      padding: 7px;
      min-height: 130px;
      font-size: 11px;
    }

    .week-day b {
      display: block;
      font-size: 11px;
      margin-bottom: 6px;
      color: var(--color-text-muted);
      text-transform: uppercase;
    }

    .event {
      padding: 4px 5px;
      border-radius: 6px;
      margin-bottom: 5px;
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      line-height: 1.35;
    }

    .event:last-child {
      margin-bottom: 0;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .table th,
    .table td {
      border-bottom: 1px solid var(--color-divider);
      text-align: left;
      padding: 7px 6px;
      vertical-align: top;
    }

    .table th {
      color: var(--color-text-faint);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--color-surface-2);
      position: sticky;
      top: 0;
    }

    .table tr:hover td {
      background: var(--color-surface-offset);
    }

    .detail {
      width: 330px;
      min-width: 330px;
      border-left: 1px solid var(--color-divider);
      background: var(--color-surface);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .detail-head {
      padding: 12px;
      border-bottom: 1px solid var(--color-divider);
    }

    .detail-type {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 99px;
      padding: 2px 7px;
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .detail-sub {
      font-size: 11px;
      color: var(--color-text-faint);
      margin-bottom: 10px;
    }

    .detail-progress {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--color-text-muted);
    }

    .bar {
      flex: 1;
      height: 4px;
      border-radius: 99px;
      background: var(--color-surface-offset);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: 99px;
      width: var(--w, 0%);
      background: var(--color-success);
    }

    .detail-tabs {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--color-divider);
    }

    .d-tab {
      border-radius: 99px;
      padding: 4px 9px;
      font-size: 11px;
      color: var(--color-text-muted);
      cursor: pointer;
      border: 1px solid transparent;
    }

    .d-tab.active {
      border-color: var(--color-primary);
      background: var(--color-primary-highlight);
      color: var(--color-primary);
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--color-text-muted);
    }

    .note {
      width: 100%;
      min-height: 120px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface-offset);
      padding: 9px;
      resize: vertical;
      margin: 8px 0;
    }

    .hline {
      height: 1px;
      background: var(--color-divider);
      margin: 10px 0;
    }

    .empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: var(--color-text-muted);
      text-align: center;
      padding: 40px;
    }

    @media (max-width: 1200px) {
      .context {
        width: 220px;
      }
      .detail {
        width: 300px;
        min-width: 300px;
      }
      .split {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 980px) {
      .context,
      .detail {
        display: none;
      }
      .topbar-title {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="icon-bar" id="rail"></aside>

    <div class="workspace">
      <header class="topbar">
        <div class="topbar-title">
          <i data-lucide="sparkles" style="width:14px;height:14px;"></i>
          Effecty Knowledge Style Demo
        </div>
        <div class="search-wrap">
          <i data-lucide="search" class="search-icon" style="width:13px;height:13px;"></i>
          <input class="search" id="search" placeholder="Поиск по задачам, заметкам, проектам, материалам..." />
        </div>
        <div class="topbar-actions">
          <button class="tb-btn" id="themeBtn" title="Сменить тему"><i data-lucide="moon" style="width:15px;height:15px;"></i></button>
          <button class="tb-btn" title="Команды"><i data-lucide="terminal" style="width:15px;height:15px;"></i></button>
        </div>
      </header>

      <div class="main">
        <aside class="context">
          <div class="context-header">
            <div class="context-title" id="contextLabel">Контекст</div>
            <button class="context-add" type="button">
              <i data-lucide="plus" style="width:12px;height:12px;"></i>
              Добавить
            </button>
          </div>
          <div class="context-list" id="contextList"></div>
        </aside>

        <section class="feature">
          <div class="feature-toolbar">
            <div>
              <div class="ft-title" id="featureTitle">Notes</div>
              <div class="ft-sub" id="featureSubtitle">Дерево заметок, редактор, мемолисты</div>
            </div>
            <button class="chip active" type="button">Все</button>
            <button class="chip" type="button">В работе</button>
            <button class="chip" type="button">Готово</button>
            <button class="primary" type="button" id="primaryBtn">
              <i data-lucide="plus" style="width:13px;height:13px;"></i>
              New
            </button>
          </div>

          <div class="feature-scroll" id="featureScroll"></div>
        </section>

        <aside class="detail">
          <div class="detail-head">
            <div class="detail-type" id="detailType">
              <i data-lucide="file-text" style="width:10px;height:10px;"></i>
              NOTE
            </div>
            <div class="detail-title" id="detailTitle">Архитектура Effecty</div>
            <div class="detail-sub" id="detailSub">updated: 2026-03-26 · owner: admin</div>
            <div class="detail-progress">
              Прогресс
              <div class="bar"><span id="detailBar" style="--w:62%"></span></div>
              <span id="detailPct">62%</span>
            </div>
          </div>

          <div class="detail-tabs" id="detailTabs">
            <button class="d-tab active" data-tab="notes" type="button">Notes</button>
            <button class="d-tab" data-tab="meta" type="button">Meta</button>
            <button class="d-tab" data-tab="links" type="button">Links</button>
          </div>

          <div class="detail-body" id="detailBody"></div>
        </aside>
      </div>
    </div>
  </div>

  <script>
    const FEATURES = [
      { id: "dashboard", label: "Dashboard", icon: "layout-dashboard", subtitle: "Сводка по задачам, тренировкам, медицине и обучению" },
      { id: "notes", label: "Notes", icon: "file-text", subtitle: "Дерево заметок, редактор, мемолисты" },
      { id: "calendar", label: "Calendar", icon: "calendar-days", subtitle: "Week / Month / Year задачи и дедлайны" },
      { id: "workouts", label: "Workouts", icon: "dumbbell", subtitle: "Тренировки, упражнения и статистика" },
      { id: "thoughts", label: "Thoughts", icon: "lightbulb", subtitle: "Мысли, теги и комментарии" },
      { id: "learning", label: "Learning", icon: "book-open", subtitle: "Материалы, темы и roadmap" },
      { id: "medical", label: "Medical", icon: "heart-pulse", subtitle: "Визиты, анализы, изображения" },
      { id: "projects", label: "Projects", icon: "kanban-square", subtitle: "Проекты и project tasks" },
      { id: "settings", label: "Settings", icon: "settings", subtitle: "Язык, масштаб, пароль, export/import" }
    ];

    const CONTEXT = {
      dashboard: [
        { id: "today", title: "Сегодня", count: 12 },
        { id: "week", title: "Неделя", count: 34 },
        { id: "focus", title: "Focus", count: 5 },
        { id: "alerts", title: "Alerts", count: 3 }
      ],
      notes: [
        { id: "n1", title: "Рабочие заметки", count: 18 },
        { id: "n2", title: "Личное", count: 7 },
        { id: "n3", title: "MemoLists", count: 5 },
        { id: "n4", title: "Черновики", count: 11 }
      ],
      calendar: [
        { id: "c1", title: "Week", count: 21 },
        { id: "c2", title: "Month", count: 52 },
        { id: "c3", title: "Year", count: 140 }
      ],
      workouts: [
        { id: "w1", title: "2026-03-26 Pull", count: 8 },

          div.className = "icon-bar-divider";
